<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            margin: 2px;
            padding: 0;
        }

        .container {
            border: 2px solid black;
            display: flex;
            width: 99%;
            height: 100%;
        }

        .top-left {
            float: left;
            width: 50%;
            height: 114px;
            display: flex;
        }

        .top-right {
            float: right;
            width: 49%;
            height: 114px;
        }

        #temp {
            font-size: 70px;
            margin-left: 100px;
            float: left;
        }

        #precipitation {
            font-size: 20px;
            margin-left: 100px;
            float: right;
            display: block;
        }

        #humidity {
            float: right;
            font-size: 20px;
            margin-left: 100px;
            display: block;
        }

        #wind {
            float: right;
            font-size: 20px;
            display: block;
            margin-left: 47px;
        }

        #location {
            float: right;
            font-size: 30px;
            display: block;
        }


        #weather {
            float: right;
            font-size: 20px;
            display: block;
            margin-left: 880px;
        }
        #right{
            width: 100%;
        }
        #left{
            width: 100%;
        }
        .days{
    width: 100%;
    height: 150px;
    margin-top: 146px;
    display: flex;
        }
        .sunday{
    height: 126px;
    width: 30%;
    margin: 12px;
    align-items: center;
    justify-content: center;
        }
        .item{
            flex-direction: column;
            display: block;
        }
        
.search {
  display: flex;
  align-items: center;
  justify-content: center;
}
button {
  margin: 0.5em;
  border-radius: 50%;
  border: none;
  height: 44px;
  width: 44px;
  outline: none;
  background: #7c7c7c2b;
  color: white;
  cursor: pointer;
  transition: 0.2s ease-in-out;
}

input.search-bar {
  border: none;
  outline: none;
  padding: 0.4em 1em;
  border-radius: 24px;
  background: #7c7c7c2b;
  color: white;
  font-family: inherit;
  font-size: 105%;
  width: calc(100% - 100px);
}

button:hover {
  background: #7c7c7c6b;
}
.h1{
    margin-left: 495px;
    font-size: 50px;
    font-family: 'Courier New', Courier, monospace;
}
    </style>
</head>

<body>
    <div class="h1">Weather App</div>
    <div class="search">
        <input type="text" class="search-bar" placeholder="Search for city">
        <button><svg stroke="currentColor" fill="currentColor" stroke-width="0" viewBox="0 0 1024 1024" height="1.5em"
            width="1.5em" xmlns="http://www.w3.org/2000/svg">
            <path
              d="M909.6 854.5L649.9 594.8C690.2 542.7 712 479 712 412c0-80.2-31.3-155.4-87.9-212.1-56.6-56.7-132-87.9-212.1-87.9s-155.5 31.3-212.1 87.9C143.2 256.5 112 331.8 112 412c0 80.1 31.3 155.5 87.9 212.1C256.5 680.8 331.8 712 412 712c67 0 130.6-21.8 182.7-62l259.7 259.6a8.2 8.2 0 0 0 11.6 0l43.6-43.5a8.2 8.2 0 0 0 0-11.6zM570.4 570.4C528 612.7 471.8 636 412 636s-116-23.3-158.4-65.6C211.3 528 188 471.8 188 412s23.3-116.1 65.6-158.4C296 211.3 352.2 188 412 188s116.1 23.2 158.4 65.6S636 352.2 636 412s-23.3 116.1-65.6 158.4z">
            </path>
          </svg></button>
      </div>
      
    <div class="container">
        
        <div class="top-left">
            <div id="right">
                <span id="temp">31</span>
                
            </div>
            <div id="left">
                <span id="humidity">Humidity : 37%</span>
                <span id="wind">Wind 14km/hr</span>
            </div>

        </div>
        <div class="top-right">
            <span id="location">Bulandshahr, Uttar Pradesh</span>
            <span id="weather">Sunny</span>
        </div>
    </div>
</body>
<script src="script.js"></script>

</html>
